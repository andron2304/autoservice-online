{% extends 'booking/base.html' %}

{% block title %}Запис на СТО{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-4">
        <h3 class="mb-4">Оформлення запису</h3>
        <div class="card shadow">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-3">Підтвердити запис</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
