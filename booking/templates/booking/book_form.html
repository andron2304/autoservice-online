<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Запис на сервіс</title>
</head>
<body>
    <h1>Запис на обслуговування</h1>
    <form method="post">
        {% csrf_token %}
        <p>Дата: <input type="date" name="date" required></p>
        <p>Час: <input type="time" name="time" required></p>
        <button type="submit">Підтвердити запис</button>
    </form>
    <br>
    <a href="{% url 'service_list' %}">Назад до списку послуг</a>
</body>
</html>
